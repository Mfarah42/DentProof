name: DentProof
options:
  bundleIdPrefix: com.dentproof
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: false

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: "" # <-- set your Apple Developer Team ID here
    SWIFT_VERSION: "5.0"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    GENERATE_INFOPLIST_FILE: NO

targets:
  DentProof:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources
        excludes:
          - "App/Info.plist"   # referenced via INFOPLIST_FILE, not bundled as a resource
      - path: Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dentproof.app
        PRODUCT_NAME: DentProof
        INFOPLIST_FILE: Sources/App/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1" # iPhone only for v1
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        SWIFT_EMIT_LOC_STRINGS: YES
    # No `info:` block on purpose — we ship a hand-written Info.plist (with the
    # camera/photos/location usage strings) referenced via INFOPLIST_FILE above.
    # Adding `info:` would make XcodeGen overwrite it.
